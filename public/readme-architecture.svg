<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" fill="none" aria-labelledby="title desc" role="img" viewBox="0 0 1280 760"><title id="title">WeSight architecture principle diagram</title><desc id="desc">WeSight uses an Electron renderer, a typed preload bridge, a main process, and an agent engine router to run Claude Code, Codex, OpenClaw, Hermes Agent, and the built-in Claude Agent SDK with local configuration, SQLite persistence, skills, and scheduled tasks.</desc><defs><linearGradient id="bg" x1="0" x2="1280" y1="0" y2="760" gradientUnits="userSpaceOnUse"><stop stop-color="#07111f"/><stop offset=".48" stop-color="#0f2137"/><stop offset="1" stop-color="#111827"/></linearGradient><linearGradient id="accent" x1="154" x2="1126" y1="144" y2="624" gradientUnits="userSpaceOnUse"><stop stop-color="#57d6ff"/><stop offset=".5" stop-color="#8ef2c6"/><stop offset="1" stop-color="#ffd166"/></linearGradient><linearGradient id="card" x1="100" x2="1180" y1="100" y2="660" gradientUnits="userSpaceOnUse"><stop stop-color="#fff" stop-opacity=".14"/><stop offset="1" stop-color="#fff" stop-opacity=".06"/></linearGradient><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path stroke="#fff" stroke-opacity=".06" stroke-width="1" d="M 40 0 L 0 0 0 40"/></pattern><filter id="shadow" width="1200" height="656" x="40" y="52" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feDropShadow dx="0" dy="26" flood-color="#000814" flood-opacity=".44" stdDeviation="32"/></filter><marker id="arrow" markerHeight="12" markerUnits="strokeWidth" markerWidth="12" orient="auto" refX="10" refY="6"><path fill="none" stroke="#9edbff" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2 2L10 6L2 10"/></marker><style>.title{font:800 34px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#f8fbff}.subtitle{font:500 16px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#a9bdd8}.label{font:800 18px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#eff6ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#cfe0f5}.tiny{font:600 12px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#98acc7}.pill{font:800 12px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#06101e}</style></defs><rect width="1280" height="760" fill="url(#bg)" rx="36"/><rect width="1280" height="760" fill="url(#grid)" rx="36"/><path stroke="url(#accent)" stroke-opacity=".18" stroke-width="2" d="M88 630C221 512 356 560 493 456C623 358 714 322 871 390C1026 458 1082 338 1196 286"/><path stroke="url(#accent)" stroke-opacity=".14" stroke-width="2" d="M116 206C257 254 378 194 505 258C655 334 778 194 916 236C1053 278 1117 210 1190 142"/><g filter="url(#shadow)"><rect width="1136" height="620" x="72" y="70" fill="url(#card)" stroke="#fff" stroke-opacity=".16" rx="30"/></g><text x="112" y="126" class="title">WeSight Architecture</text><text x="112" y="156" class="subtitle">Desktop UI, local configuration, managed runtimes, and CLI-native agents behind one visual workspace.</text><rect width="122" height="32" x="1030" y="104" fill="url(#accent)" rx="16"/><text x="1053" y="125" class="pill">Electron App</text><rect width="230" height="286" x="112" y="212" fill="#07111f" fill-opacity=".58" stroke="#57d6ff" stroke-opacity=".32" rx="22"/><text x="142" y="252" class="label">Renderer</text><text x="142" y="280" class="tiny">React + Redux + Tailwind</text><rect width="178" height="34" x="138" y="314" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="158" y="336" class="small">Cowork Chat UI</text><rect width="178" height="34" x="138" y="360" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="158" y="382" class="small">Engine Selector</text><rect width="178" height="34" x="138" y="406" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="158" y="428" class="small">Model Settings</text><rect width="178" height="34" x="138" y="452" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="158" y="474" class="small">Skills / Tasks / Pet</text><rect width="162" height="222" x="386" y="244" fill="#0b1728" fill-opacity=".72" stroke="#fff" stroke-opacity=".16" rx="22"/><text x="424" y="284" class="label">Preload</text><text x="423" y="312" class="tiny">contextBridge</text><rect width="104" height="34" x="416" y="346" fill="#57d6ff" fill-opacity=".18" stroke="#57d6ff" stroke-opacity=".42" rx="17"/><text x="443" y="368" class="small">IPC</text><text x="418" y="410" class="tiny">Typed boundary</text><text x="418" y="432" class="tiny">No Node access</text><rect width="276" height="344" x="592" y="184" fill="#07111f" fill-opacity=".58" stroke="#8ef2c6" stroke-opacity=".32" rx="24"/><text x="626" y="224" class="label">Main Process</text><text x="626" y="252" class="tiny">Privileged desktop runtime</text><rect width="216" height="34" x="622" y="286" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="643" y="308" class="small">Cowork Store + SQLite</text><rect width="216" height="34" x="622" y="332" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="643" y="354" class="small">Skill Manager</text><rect width="216" height="34" x="622" y="378" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="643" y="400" class="small">Runtime Managers</text><rect width="216" height="34" x="622" y="424" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="643" y="446" class="small">Permission Events</text><rect width="156" height="34" x="652" y="482" fill="#8ef2c6" fill-opacity=".95" rx="17"/><text x="675" y="504" class="pill">Engine Router</text><rect width="252" height="390" x="916" y="160" fill="#07111f" fill-opacity=".58" stroke="#ffd166" stroke-opacity=".34" rx="24"/><text x="950" y="200" class="label">Agent Engines</text><text x="950" y="228" class="tiny">One stream contract</text><rect width="188" height="34" x="948" y="262" fill="#57d6ff" fill-opacity=".15" stroke="#57d6ff" stroke-opacity=".36" rx="12"/><text x="980" y="284" class="small">Claude Code CLI</text><rect width="188" height="34" x="948" y="308" fill="#8ef2c6" fill-opacity=".14" stroke="#8ef2c6" stroke-opacity=".36" rx="12"/><text x="1010" y="330" class="small">Codex CLI</text><rect width="188" height="34" x="948" y="354" fill="#ffd166" fill-opacity=".14" stroke="#ffd166" stroke-opacity=".36" rx="12"/><text x="995" y="376" class="small">OpenClaw</text><rect width="188" height="34" x="948" y="400" fill="#c7b7ff" fill-opacity=".14" stroke="#c7b7ff" stroke-opacity=".36" rx="12"/><text x="985" y="422" class="small">Hermes Agent</text><rect width="188" height="34" x="948" y="446" fill="#fff" fill-opacity=".08" stroke="#fff" stroke-opacity=".11" rx="12"/><text x="978" y="468" class="small">Claude Agent SDK</text><text x="950" y="514" class="tiny">Streams: message, tool call, command result, error</text><path stroke="#9edbff" stroke-opacity=".9" stroke-width="2.2" marker-end="url(#arrow)" d="M342 355H386"/><path stroke="#9edbff" stroke-opacity=".9" stroke-width="2.2" marker-end="url(#arrow)" d="M548 355H592"/><path stroke="#9edbff" stroke-opacity=".9" stroke-width="2.2" marker-end="url(#arrow)" d="M808 499C856 499 862 356 916 356"/><path stroke="#8ef2c6" stroke-dasharray="7 8" stroke-opacity=".72" stroke-width="2" marker-end="url(#arrow)" d="M916 508C796 608 474 610 230 508"/><text x="505" y="635" class="tiny">stream updates and permission decisions return to the visual chat</text><rect width="236" height="66" x="112" y="562" fill="#fff" fill-opacity=".07" stroke="#fff" stroke-opacity=".12" rx="18"/><text x="138" y="590" class="small">Unified Model Settings</text><text x="138" y="612" class="tiny">providers, models, local CLI mode</text><rect width="236" height="66" x="386" y="562" fill="#fff" fill-opacity=".07" stroke="#fff" stroke-opacity=".12" rx="18"/><text x="412" y="590" class="small">Local Data</text><text x="412" y="612" class="tiny">SQLite, sessions, memory, config</text><rect width="236" height="66" x="660" y="562" fill="#fff" fill-opacity=".07" stroke="#fff" stroke-opacity=".12" rx="18"/><text x="686" y="590" class="small">Managed Runtimes</text><text x="686" y="612" class="tiny">vendor builds and pinned versions</text><rect width="236" height="66" x="934" y="562" fill="#fff" fill-opacity=".07" stroke="#fff" stroke-opacity=".12" rx="18"/><text x="960" y="590" class="small">User Environment</text><text x="960" y="612" class="tiny">npm, CLI accounts, system config</text><path stroke="#fff" stroke-opacity=".2" stroke-width="2" d="M230 562V498"/><path stroke="#fff" stroke-opacity=".2" stroke-width="2" d="M504 562V528"/><path stroke="#fff" stroke-opacity=".2" stroke-width="2" d="M778 562V528"/><path stroke="#fff" stroke-opacity=".2" stroke-width="2" d="M1052 562V550"/></svg>