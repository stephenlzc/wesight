<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" fill="none" viewBox="0 0 720 460"><rect width="720" height="460" fill="#f3f4f6" rx="28"/><rect width="584" height="380" x="68" y="40" fill="#f8fafc" stroke="#d1d5db" rx="20"/><circle cx="360" cy="130" r="48" fill="#facc15" stroke="#fff" stroke-width="8"/><path stroke="#fff" stroke-linecap="round" stroke-width="12" d="M360 101v48"/><circle cx="360" cy="166" r="6" fill="#fff"/><text x="360" y="228" fill="#3f3f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" text-anchor="middle">“WeSight.app” 已损坏，无法打开。</text><text x="360" y="268" fill="#3f3f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" text-anchor="middle">你应该将它移到废纸篓。</text><text x="360" y="318" fill="#9ca3af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" text-anchor="middle">这是 macOS 对未签名应用的安全隔离提示</text><rect width="248" height="58" x="96" y="350" fill="#e5e7eb" rx="14"/><rect width="248" height="58" x="376" y="350" fill="#d1d5db" rx="14"/><text x="220" y="388" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">取消</text><text x="500" y="388" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">移到废纸篓</text></svg>