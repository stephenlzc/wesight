name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing GitHub Release tag to upload Windows assets to. Leave empty to use today, for example v2026.6.6.'
        required: false
        default: ''
      upload_to_release:
        description: 'Upload built Windows assets to the release'
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    outputs:
      effective_release_tag: ${{ steps.build_metadata.outputs.effective_release_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Compute date-based build version
        id: build_metadata
        shell: pwsh
        run: |
          # Use UTC so artifact names and release tags are stable across runners.
          $now = [DateTime]::UtcNow
          $artifactDate = $now.ToString('yyyy.MM.dd')
          $appVersion = '{0}.{1}.{2}' -f $now.Year, $now.Month, $now.Day
          "WESIGHT_BUILD_DATE=$artifactDate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WESIGHT_APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EFFECTIVE_RELEASE_TAG=v$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "effective_release_tag=v$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Artifact date: $artifactDate"
          Write-Host "App version: $appVersion"

      - name: Build Windows x64 installer
        run: npm run dist:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Generate Windows checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem release -File |
            Where-Object { $_.Name -match '\.(exe|blockmap)$' -or $_.Name -eq 'latest.yml' } |
            Sort-Object Name
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Path release/SHASUMS256-windows.txt -Encoding utf8

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
            release/SHASUMS256-windows.txt
          retention-days: 7

  upload-release-assets:
    needs: build-windows-x64
    if: ${{ inputs.upload_to_release }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-x64-build
          path: artifacts/windows-x64-build

      - name: Upload Windows assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          EFFECTIVE_RELEASE_TAG: ${{ needs.build-windows-x64.outputs.effective_release_tag }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${INPUT_RELEASE_TAG:-$EFFECTIVE_RELEASE_TAG}"
          gh release upload "$RELEASE_TAG" artifacts/windows-x64-build/* --clobber --repo "$GITHUB_REPOSITORY"
