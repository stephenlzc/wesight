name: Build Platforms

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ========== macOS Apple Silicon 构建 ==========
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - run: npm install

      - name: Verify Apple Silicon runner
        run: |
          test "$(uname -m)" = "arm64"
          node -e "if (process.arch !== 'arm64') process.exit(1)"

      # 设置 OpenClaw runtime (如果需要)
      - name: Setup OpenClaw Runtime
        run: |
          if [ -d "vendor/openclaw-runtime/current" ]; then
            echo "✓ OpenClaw runtime found"
          else
            echo "⚠ OpenClaw runtime not found, build may fail"
          fi

      - name: Build macOS arm64
        run: npm run dist:mac:arm64 -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: release/*.dmg
          retention-days: 7

  # ========== 创建 Release ==========
  create-release:
    needs: [build-macos-arm64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          args=(
            "$TAG_NAME"
            artifacts/macos-arm64-build/*.dmg
            --draft
            --generate-notes
            --title "$TAG_NAME"
            --repo "$GITHUB_REPOSITORY"
          )

          if [[ "$TAG_NAME" == *"-alpha"* || "$TAG_NAME" == *"-beta"* || "$TAG_NAME" == *"-rc"* ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
